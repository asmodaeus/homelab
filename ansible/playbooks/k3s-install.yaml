---
- name: Install K3s cluster
  hosts: k3s_cluster
  roles:
    - role: xanmanning.k3s
      vars:
        k3s_state: installed

- name: Fetch kubeconfig from server
  hosts: server
  become: true
  tasks:
    - name: Copy kubeconfig to local machine
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/../../kubeconfig"
        flat: true

- name: Patch kubeconfig with real server IP
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Replace localhost with server IP in kubeconfig
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/../../kubeconfig"
        regexp: "https://127.0.0.1:6443"
        replace: "https://{{ hostvars[groups['server'][0]]['ansible_host'] }}:6443"
