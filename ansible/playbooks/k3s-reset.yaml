---
# ACHTUNG: Dieses Playbook deinstalliert K3s auf allen Nodes komplett.
# Alle Kubernetes-Ressourcen und Daten auf den Nodes gehen verloren.
# NFS-Daten auf dem NAS bleiben erhalten.
- name: Reset K3s cluster
  hosts: k3s_cluster
  roles:
    - role: xanmanning.k3s
      vars:
        k3s_state: uninstalled
