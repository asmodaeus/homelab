---
# ANPASSEN: Echte IPs eintragen und Hostnamen setzen
# Statische DHCP-Leases im Router zuerst konfigurieren!
k3s_cluster:
  children:
    server:
      hosts:
        pi4:
          ansible_host: 192.168.1.10  # ANPASSEN: Pi 4 IP
          ansible_user: pi
    agent:
      hosts:
        pi3:
          ansible_host: 192.168.1.11  # ANPASSEN: Pi 3 IP
          ansible_user: pi
          # Pi 3 = 1GB RAM, nur leichte Workloads (Zigbee2MQTT + Mosquitto)
          # Nach K3s-Install Taints/Labels setzen: siehe docs/bootstrap.md
