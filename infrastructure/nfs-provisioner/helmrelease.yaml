---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-subdir-external-provisioner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
    chart: nfs-subdir-external-provisioner
    targetRevision: "4.0.18"
    helm:
      values: |
        # ANPASSEN: NAS-IP und NFS-Export-Pfad vor Phase 2 eintragen
        nfs:
          server: 192.168.1.20  # ANPASSEN: NAS-IP-Adresse
          path: /volume1/k8s    # ANPASSEN: NFS-Export-Pfad auf dem NAS

        storageClass:
          name: nfs
          defaultClass: true
          reclaimPolicy: Retain
          archiveOnDelete: true

        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            memory: 64Mi

        nodeSelector: {}
        tolerations: []
  destination:
    server: https://kubernetes.default.svc
    namespace: nfs-provisioner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
