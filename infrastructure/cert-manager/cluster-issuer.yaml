---
# Phase 4: Erst aktivieren wenn Cloudflare API-Token als Sealed Secret vorhanden
# und cert-manager installiert ist
#
# Sealed Secret für Cloudflare API-Token erstellen:
# kubectl create secret generic cloudflare-api-token \
#   --from-literal=api-token=DEIN_TOKEN \
#   --dry-run=client -o yaml -n cert-manager | \
#   kubeseal --format yaml > infrastructure/cert-manager/cloudflare-token-sealed.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com  # ANPASSEN: Eigene E-Mail
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            email: admin@example.com  # ANPASSEN: Cloudflare-Account-E-Mail
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
