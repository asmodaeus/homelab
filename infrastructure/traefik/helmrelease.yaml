---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "33.2.1"
    helm:
      values: |
        deployment:
          replicas: 1

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi

        gateway:
          enabled: true
          name: homelab
          namespace: "{{ .Release.Namespace }}"
          annotations: {}
          listeners:
            web:
              port: 8000
              hostname: ""
              protocol: HTTP
              namespacePolicy: All
            websecure:
              port: 8443
              hostname: ""
              protocol: HTTPS
              namespacePolicy: All
              certificateRefs: []  # Phase 4: - name: wildcard-tls / kind: Secret

        gatewayClass:
          enabled: true
          name: traefik

        ingressClass:
          enabled: false
          isDefaultClass: false

        service:
          enabled: true
          type: LoadBalancer
          annotations: {}

        logs:
          general:
            level: INFO
          access:
            enabled: false

        providers:
          kubernetesGateway:
            enabled: true
          kubernetesIngress:
            enabled: false

        metrics:
          prometheus:
            enabled: true
            addEntryPointsLabels: true
            addRoutersLabels: true
            addServicesLabels: true

        ports:
          web:
            port: 8000
            expose:
              default: true
            exposedPort: 80
            protocol: TCP
          websecure:
            port: 8443
            expose:
              default: true
            exposedPort: 443
            protocol: TCP
            tls:
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
