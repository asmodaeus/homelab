---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: homelab

servers: 1
agents: 1

options:
  k3s:
    extraArgs:
      # Eigenes Traefik via ArgoCD wird installiert
      - arg: --disable=traefik
        nodeFilters: [server:*]
      # Eigenes MetalLB via ArgoCD wird installiert
      - arg: --disable=servicelb
        nodeFilters: [server:*]
      # Agent-Node simuliert Pi 3 (Zigbee-Adapter) – Labels + Taint wie in Produktion
      - arg: --node-label=homelab/zigbee-adapter=true
        nodeFilters: [agent:0]
      - arg: --node-label=workload=light
        nodeFilters: [agent:0]
      - arg: --node-taint=workload=light:NoSchedule
        nodeFilters: [agent:0]

# Port-Forwarding für lokalen Zugriff auf LoadBalancer-Services
ports:
  - port: 80:80
    nodeFilters: [loadbalancer]
  - port: 443:443
    nodeFilters: [loadbalancer]
  - port: 3000:3000   # Gitea (lokaler Git-Server)
    nodeFilters: [loadbalancer]

# kubeconfig wird in ~/.kube/config gemergt
kubeAPI:
  hostIP: "0.0.0.0"
  hostPort: "6443"
