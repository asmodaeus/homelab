---
# Generiert Applications für infrastructure/ und apps/ dynamisch.
# targetRevision wird aus dem Cluster-Secret "homelab-cluster" gelesen,
# das vom bootstrap-local.sh gesetzt wird — nicht von ArgoCD verwaltet.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homelab-cluster: "true"
          - list:
              elements:
                - path: infrastructure
                  wave: "-2"
                - path: apps
                  wave: "0"
  template:
    metadata:
      name: '{{path}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/asmodaeus/homelab.git
        targetRevision: '{{metadata.annotations.targetRevision}}'
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
