---
# Generiert Applications für infrastructure/ und apps/ dynamisch.
# targetRevision wird aus dem Cluster-Secret "homelab-cluster" gelesen,
# das vom bootstrap-local.sh gesetzt wird — nicht von ArgoCD verwaltet.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: sync-order
              operator: In
              values:
                - "1"
        - matchExpressions:
            - key: sync-order
              operator: In
              values:
                - "2"
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homelab-cluster: "true"
          - list:
              elements:
                - path: infrastructure
                  syncOrder: "1"
                - path: apps
                  syncOrder: "2"
  template:
    metadata:
      name: '{{path}}'
      namespace: argocd
      labels:
        sync-order: '{{syncOrder}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/asmodaeus/homelab.git
        targetRevision: '{{metadata.annotations.targetRevision}}'
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
