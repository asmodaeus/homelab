---
# Generiert Applications für alle Verzeichnisse dynamisch.
# repoURL + targetRevision werden aus dem Cluster-Secret "homelab-cluster" gelesen
# (vom bootstrap-local.sh bzw. Ansible gesetzt — nicht von ArgoCD verwaltet).
#
# Cluster-Labels steuern was deployed wird:
#   homelab-cluster: "true"       → alle Cluster (lokal + produktion)
#   homelab-env: local            → nur lokaler k3d-Cluster (z.B. Gitea)
#   homelab-env: production       → nur Pi-Cluster (z.B. k3s-Upgrade-Plans)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  goTemplate: true
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: sync-order
              operator: In
              values: ["0"]
        - matchExpressions:
            - key: sync-order
              operator: In
              values: ["1"]
        - matchExpressions:
            - key: sync-order
              operator: In
              values: ["2"]
        - matchExpressions:
            - key: sync-order
              operator: In
              values: ["3"]
  generators:
    # Nur lokal: Gitea und andere lokale Hilfsdienste
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homelab-cluster: "true"
                  homelab-env: local
          - list:
              elements:
                - appName: local
                  path: local
                  syncOrder: "0"
                  exclude: ""
    # Alle Cluster: infrastructure, config (ohne system-upgrade), apps
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homelab-cluster: "true"
          - list:
              elements:
                - appName: infrastructure
                  path: infrastructure
                  syncOrder: "1"
                  exclude: ""
                - appName: config
                  path: config
                  syncOrder: "2"
                  exclude: "system-upgrade/**"
                - appName: apps
                  path: apps
                  syncOrder: "3"
                  exclude: ""
    # Nur Production: config/system-upgrade (k3s-Upgrade-Plans)
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  homelab-cluster: "true"
                  homelab-env: production
          - list:
              elements:
                - appName: config-system-upgrade
                  path: config/system-upgrade
                  syncOrder: "2"
                  exclude: ""
  template:
    metadata:
      name: '{{ .appName }}'
      namespace: argocd
      labels:
        sync-order: '{{ .syncOrder }}'
    spec:
      project: default
      source:
        repoURL: '{{ index .metadata.annotations "repoURL" }}'
        targetRevision: '{{ index .metadata.annotations "targetRevision" }}'
        path: '{{ .path }}'
        directory:
          recurse: true
          exclude: '{{ .exclude }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
