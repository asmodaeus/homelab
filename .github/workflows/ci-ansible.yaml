---
name: Ansible Lint

on:
  push:
    paths:
      - "ansible/**"
  pull_request:
    paths:
      - "ansible/**"

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24
        with:
          path: ansible/
