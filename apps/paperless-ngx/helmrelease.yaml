---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless-ngx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.gabe565.com
    chart: paperless-ngx
    targetRevision: "0.24.1"
    helm:
      values: |
        image:
          tag: "2.14.7"

        env:
          PAPERLESS_URL: http://paperless.local  # ANPASSEN: Phase 4 → https://paperless.home.domain.com
          PAPERLESS_TIME_ZONE: Europe/Berlin
          PAPERLESS_OCR_LANGUAGE: deu+eng
          PAPERLESS_CONSUMER_POLLING: "60"
          PAPERLESS_CONSUMER_POLLING_RETRY_COUNT: "5"
          PAPERLESS_TASK_WORKERS: "1"
          PAPERLESS_THREADS_PER_WORKER: "1"
          PAPERLESS_WEBSERVER_WORKERS: "1"
          PAPERLESS_REDIS: redis://paperless-redis:6379

        envFrom:
          - secretRef:
              name: paperless-secrets

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 768Mi

        persistence:
          data:
            enabled: true
            storageClass: nfs
            accessMode: ReadWriteOnce
            size: 10Gi
          media:
            enabled: true
            storageClass: nfs
            accessMode: ReadWriteOnce
            size: 20Gi
          export:
            enabled: true
            storageClass: nfs
            accessMode: ReadWriteOnce
            size: 5Gi
          consume:
            enabled: true
            storageClass: nfs
            accessMode: ReadWriteOnce
            size: 2Gi

        redis:
          enabled: false

        postgresql:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: paperless
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
