---
# Lokales Dummy-Secret für paperless-ngx (nur homelab-env: local).
# Produktion: SealedSecret in apps/paperless-ngx/ anlegen.
apiVersion: v1
kind: Secret
metadata:
  name: paperless-secrets
  namespace: paperless
stringData:
  PAPERLESS_SECRET_KEY: local-dev-secret-key-not-for-production
  PAPERLESS_DBPASS: paperless
  PAPERLESS_DBUSER: paperless
  PAPERLESS_DBNAME: paperless
