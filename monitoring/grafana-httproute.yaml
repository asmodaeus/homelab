---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - name: homelab
      namespace: traefik
      sectionName: web
  hostnames:
    - grafana.local  # ANPASSEN: Phase 4 → grafana.home.yourdomain.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: victoria-metrics-stack-grafana
          port: 80
