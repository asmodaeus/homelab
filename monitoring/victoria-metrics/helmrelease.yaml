---
# Phase 2: Erst deployen wenn 3. Pi (HA-Pi) im Cluster ist!
# RAM-Budget Pi 4 2GB ist ohne 3. Node zu eng für Monitoring.
# Aktivieren via Cluster-Label `homelab-monitoring=enabled`, sobald der
# ehemalige HA-Pi als K3s-Agent läuft.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: victoria-metrics-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            homelab-cluster: "true"
            homelab-monitoring: enabled
  template:
    metadata:
      name: victoria-metrics-stack
      namespace: argocd
    spec:
      project: default
      sources:
        - repoURL: https://victoriametrics.github.io/helm-charts
          chart: victoria-metrics-k8s-stack
          targetRevision: "0.27.5"
          helm:
            valueFiles:
              - $values/monitoring/victoria-metrics/values.yaml
        - repoURL: '{{ index .metadata.annotations "repoURL" }}'
          targetRevision: '{{ index .metadata.annotations "targetRevision" }}'
          ref: values
      destination:
        server: '{{ .server }}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
